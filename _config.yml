# Site Settings
locale                   : "en-US"
title                    : "Heather Baier"
title_separator          : "-"
name                     : &name "Heather Baier"
description              : &description "Assistant Professor, Arizona State University"
url                      : https://heatherbaier.github.io
baseurl                  : "" # the subpath of your site, e.g. /blog
repository               : "heatherbaier/heatherbaier.github.io"

# Author Settings
author:
  name             : "Heather Baier"
  avatar           : "images/profile.jpg"
  bio              : "Assistant Professor at Arizona State University's School of Geographical Sciences and Urban Planning. My research focuses on GeoAI, satellite imagery, and spatial social science."
  location         : "Tempe, AZ"
  employer         : "Arizona State University"
  email            : "your-email@asu.edu"
  twitter          : ""        # Fill in your Twitter handle
  github           : "heatherbaier"
  googlescholar    : ""        # Fill in your Google Scholar ID
  orcid            : ""        # Fill in your ORCID
  linkedin         : ""        # Fill in your LinkedIn handle

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Gemfile
  - Gemfile.lock
  - Gruntfile.js
  - LICENSE
  - README
  - node_modules
  - tmp

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

# Collections
collections:
  publications:
    output: true
    permalink: /:collection/:path/
  teaching:
    output: true
    permalink: /:collection/:path/
  projects:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: projects
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Navigation
navigation:
  - title: "Publications"
    url: /publications/
  - title: "Teaching"
    url: /teaching/
  - title: "Projects"
    url: /projects/

# Theme
remote_theme: academicpages/academicpages.github.io

# Build settings
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: America/Phoenix
